services:
  portfolio:
    build: .
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: local-container-development-only
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8000
    volumes:
      - portfolio-data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  portfolio-data:
